<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="gallery.css">
	<script src = "gallery.js"></script>
</head>
<body onload="setImages()">

	<input type="text" onfocus="toColor(this)" onblur="toNormal(this)">
	
	<div id = "image">
		Hover over an image below to display here.
	</div>
	
	<img class = "preview" alt = "What a year!" src = "2026.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" >
	
	<img class = "preview" alt = "Let's dream" src = "dream.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()">
	
	<img class = "preview" src = "open.jpg" alt = "Always open!" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "opening.jpg" alt = "This is the day" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "booster.jpg" alt = "So good" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "paysage.jpg" alt = "So beautiful" onmouseover = "upDate(this)" onmouseout = "unDo()">

</body>
</html>
